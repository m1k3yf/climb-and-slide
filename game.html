<!DOCTYPE html>

<meta name="theme-color" content="#f4efe6" />
<meta property="og:title" content="Climb & Slide" />
<meta property="og:description" content="A modern take on a classic dice race. Free to play." />

<meta property="og:url" content="https://m1k3yf.github.io/climb-and-slide/" />
<meta property="og:image" content="https://m1k3yf.github.io/climb-and-slide/og.png" />

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a1f2e'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' font-family='system-ui' font-size='36' font-weight='700' fill='%23e8b23e'%3E%E2%86%91%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4efe6;
    --bg-2: #eae3d4;
    --ink: #1a1f2e;
    --ink-2: #384056;
    --mute: #8a8578;
    --line: #1a1f2e;
    --board-bg: #1a1f2e;
    --board-light: #f7f1e4;
    --board-dark: #2a3144;
    --accent: #e8583e;
    --accent-2: #2a8a5f;
    --accent-3: #e8b23e;
    --accent-4: #5b6cff;
    --p1: #e8583e;
    --p2: #2a8a5f;
    --p3: #e8b23e;
    --p4: #5b6cff;
    --p5: #a855a0;
    --robot: #2a3144;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
  }
  body {
    background:
      radial-gradient(ellipse at 20% 0%, #fdf7ea 0%, transparent 50%),
      radial-gradient(ellipse at 100% 100%, #e8dfc8 0%, transparent 55%),
      var(--bg);
  }
  #root { height: 100%; }
  button { font-family: inherit; border: none; cursor: pointer; background: none; color: inherit; }
  .mono { font-family: 'Geist Mono', monospace; }
  .serif { font-family: 'Bricolage Grotesque', serif; font-optical-sizing: auto; letter-spacing: -0.02em; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">

// === board.jsx ===
// Board data + rendering

// Chutes (snakes): start (high) -> end (low)  with color palette per snake
// Ladders: start (low) -> end (high)  with color palette per ladder
const CHUTES_LIST = [
  { from: 98, to: 78, color: '#1ac0c6' },  // turquoise
  { from: 93, to: 73, color: '#ffc93d' },  // sunshine yellow
  { from: 87, to: 24, color: '#ff7a3d', spiral: true },  // coral orange — spiral tube slide
  { from: 64, to: 60, color: '#7ed957' },  // lime green
  { from: 62, to: 19, color: '#3da0ff' },  // sky blue
  { from: 56, to: 53, color: '#c77dff' },  // lavender
  { from: 49, to: 11, color: '#9b5cff', portal: true },  // random-transport PORTAL
  { from: 47, to: 26, color: '#ff4d6d' },  // watermelon
  { from: 16, to: 6,  color: '#f7a824' },  // mango
];
const CHUTES = Object.fromEntries(CHUTES_LIST.map(c => [c.from, c.to]));
const PORTAL_SQUARES = new Set(CHUTES_LIST.filter(c => c.portal).map(c => c.from));

// ==== Spiral slide geometry ====
// The big spiral (87→24) is drawn as a series of alternating front/back arches that
// together form a coiled tube. We extract the geometry so both the renderer AND the
// token-slide animation use the same path.
const SPIRAL_NUM_LOOPS = 4;   // fewer, bigger loops = more 3D pop
const SPIRAL_ARCH_R = 7.2;    // perpendicular amplitude of each arch
const SPIRAL_TUBE_W = 3.6;    // tube stroke width

function computeSpiralGeometry(fromSq, toSq) {
  const ax = ((fromSq - 1) % 10);
  const ay = Math.floor((fromSq - 1) / 10);
  void ax; void ay; // keep linter quiet — actual position math uses squareToPct below
  const a = (function sqToPct(sq) {
    const row = Math.floor((sq - 1) / 10);
    const inRow = (sq - 1) % 10;
    const col = row % 2 === 0 ? inRow : 9 - inRow;
    return { x: (col + 0.5) * 10, y: 100 - (row + 0.5) * 10 };
  })(fromSq);
  const b = (function sqToPct(sq) {
    const row = Math.floor((sq - 1) / 10);
    const inRow = (sq - 1) % 10;
    const col = row % 2 === 0 ? inRow : 9 - inRow;
    return { x: (col + 0.5) * 10, y: 100 - (row + 0.5) * 10 };
  })(toSq);
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.hypot(dx, dy);
  const nxAx = -dy / len, nyAx = dx / len;
  const segs = SPIRAL_NUM_LOOPS * 2;
  const boundaries = [];
  for (let i = 0; i <= segs; i++) {
    const t = i / segs;
    boundaries.push({ x: a.x + dx * t, y: a.y + dy * t });
  }
  const arches = [];
  for (let i = 0; i < segs; i++) {
    const s = boundaries[i];
    const e = boundaries[i + 1];
    const isFront = i % 2 === 0;
    const sign = isFront ? -1 : 1;
    const midAxisX = (s.x + e.x) / 2;
    const midAxisY = (s.y + e.y) / 2;
    const ctrlX = midAxisX + sign * nxAx * SPIRAL_ARCH_R;
    const ctrlY = midAxisY + sign * nyAx * SPIRAL_ARCH_R;
    arches.push({ s, e, ctrl: { x: ctrlX, y: ctrlY }, isFront });
  }
  return { a, b, boundaries, arches };
}

// Sample N points along one quadratic bezier arch
function sampleQuad(s, ctrl, e, n) {
  const out = [];
  for (let i = 0; i < n; i++) {
    const t = i / n;
    const mt = 1 - t;
    out.push({
      x: mt * mt * s.x + 2 * mt * t * ctrl.x + t * t * e.x,
      y: mt * mt * s.y + 2 * mt * t * ctrl.y + t * t * e.y,
    });
  }
  return out;
}

// Flatten the entire spiral path into a dense sequence of {x,y} points (in board % coords).
function sampleSpiralPath(fromSq, toSq, samplesPerArch = 28) {
  const { arches } = computeSpiralGeometry(fromSq, toSq);
  const pts = [];
  for (const ar of arches) pts.push(...sampleQuad(ar.s, ar.ctrl, ar.e, samplesPerArch));
  const last = arches[arches.length - 1].e;
  pts.push({ x: last.x, y: last.y });
  return pts;
}

const LADDERS_LIST = [
  { from: 4,  to: 14, color: '#e8b23e' },  // gold
  { from: 9,  to: 31, color: '#e8583e' },  // red
  { from: 20, to: 38, color: '#4a9e5c' },  // green
  { from: 28, to: 84, color: '#3a7ac4' },  // blue
  { from: 40, to: 59, color: '#c44a78' },  // pink
  { from: 51, to: 67, color: '#8f5ac9' },  // purple
  { from: 63, to: 81, color: '#e88c3e' },  // orange
  { from: 71, to: 91, color: '#2f8f82' },  // teal
];
const LADDERS = Object.fromEntries(LADDERS_LIST.map(l => [l.from, l.to]));

// convert 1..100 to (row, col) in boustrophedon, row 0 = bottom
function squareToRC(sq) {
  const row = Math.floor((sq - 1) / 10);
  const inRow = (sq - 1) % 10;
  const col = row % 2 === 0 ? inRow : 9 - inRow;
  return { row, col };
}

// Returns {x,y} center in % (0..100) with row 0 at bottom
function squareToPct(sq) {
  const { row, col } = squareToRC(sq);
  const x = (col + 0.5) * 10;
  const y = 100 - (row + 0.5) * 10;
  return { x, y };
}

function Board({ players, currentPlayerIdx, tokenPositions, highlightedSquare, tweaks = {}, phase = 'waiting', tokenOverride = null }) {
  const showHintArrows = tweaks.showHintArrows !== false;
  const showGlidePath = tweaks.showGlidePath !== false;
  const boardScale = tweaks.boardScale ?? 1;
  const boardBgMode = tweaks.boardBgMode ?? 'dark';
  const themeVars = boardBgMode === 'light'
    ? { '--board-bg': '#e6dbbd' }
    : boardBgMode === 'cream'
    ? { '--board-bg': '#f4ecd8' }
    : { '--board-bg': '#1a1f2e' };
  const squares = [];
  for (let row = 9; row >= 0; row--) {
    const nums = [];
    for (let c = 0; c < 10; c++) {
      const col = row % 2 === 0 ? c : 9 - c;
      nums.push(row * 10 + col + 1);
    }
    squares.push(nums);
  }

  return (
    <div className="board-wrap" style={{ ...themeVars, transform: `scale(${boardScale})`, transformOrigin: 'center top' }}>
      <div className="board">
        {/* checker squares */}
        <div className="board-grid">
          {squares.map((rowNums, rIdx) => rowNums.map((n, cIdx) => {
            const isDark = (rIdx + cIdx) % 2 === 0;
            const isStart = n === 1;
            const isEnd = n === 100;
            const isChute = n in CHUTES;
            const isLadder = n in LADDERS;
            const isPortal = PORTAL_SQUARES.has(n);
            const isHighlight = highlightedSquare === n;
            return (
              <div
                key={n}
                className={`sq ${isDark ? 'dark' : 'light'} ${isHighlight ? 'hl' : ''}`}
                style={{ gridRow: rIdx + 1, gridColumn: cIdx + 1 }}
              >
                <span className="sq-num mono">{n}</span>
                {isStart && <span className="sq-tag">START</span>}
                {isEnd && <span className="sq-tag gold">FINISH</span>}
                {isChute && !isPortal && showHintArrows && <span className="sq-dot chute" title={`Chute to ${CHUTES[n]}`}>▾</span>}
                {isPortal && showHintArrows && <span className="sq-dot portal" title="Random transport portal">✦</span>}
                {isLadder && showHintArrows && <span className="sq-dot ladder" title={`Ladder to ${LADDERS[n]}`}>▴</span>}
              </div>
            );
          }))}
        </div>

        {/* SVG overlay for chutes and ladders - 3D */}
        <svg className="board-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <defs>
            <filter id="castShadowSoft" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="1.8"/>
            </filter>
            <filter id="castShadowHeavy" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.4"/>
            </filter>
          </defs>

          {/* ======== LADDERS (per-item colored wood) ======== */}
          {LADDERS_LIST.map(({ from, to, color }) => {
            const a = squareToPct(+from);
            const b = squareToPct(+to);
            const dx = b.x - a.x, dy = b.y - a.y;
            const len = Math.hypot(dx, dy);
            const ang = Math.atan2(dy, dx) * 180 / Math.PI;
            const w = 3.8;
            const numRungs = Math.max(3, Math.floor(len / 2.3));
            const shade = (hex, amt) => {
              const n = parseInt(hex.slice(1), 16);
              const r = Math.max(0, Math.min(255, ((n >> 16) & 255) + amt));
              const g = Math.max(0, Math.min(255, ((n >> 8) & 255) + amt));
              const bl = Math.max(0, Math.min(255, (n & 255) + amt));
              return `rgb(${r|0},${g|0},${bl|0})`;
            };
            const rLight = shade(color, 70);
            const rMid = color;
            const rDark = shade(color, -45);
            const rDarker = shade(color, -85);
            const uid = `lad-${from}`;
            return (
              <g key={'l' + from} transform={`translate(${a.x} ${a.y}) rotate(${ang})`}>
                <defs>
                  <linearGradient id={`${uid}-rail`} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={rLight}/>
                    <stop offset="50%" stopColor={rMid}/>
                    <stop offset="100%" stopColor={rDark}/>
                  </linearGradient>
                  <linearGradient id={`${uid}-rung`} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={rLight}/>
                    <stop offset="50%" stopColor={rMid}/>
                    <stop offset="100%" stopColor={rDarker}/>
                  </linearGradient>
                </defs>
                {/* cast shadow */}
                <g transform="translate(0.9 1.5)" opacity="0.4">
                  <rect x="-1" y={-w/2 - 0.2} width={len + 2} height="0.9" fill="#000" filter="url(#castShadowSoft)"/>
                  <rect x="-1" y={w/2 - 0.7} width={len + 2} height="0.9" fill="#000" filter="url(#castShadowSoft)"/>
                </g>
                {/* back-face (dark side) rails for 3D depth */}
                <rect x="-0.9" y={-w/2 + 0.1} width={len + 1.8} height="1.1" fill={rDarker} rx="0.3"/>
                <rect x="-0.9" y={w/2 - 1.2} width={len + 1.8} height="1.1" fill={rDarker} rx="0.3"/>
                {/* front face rails */}
                <rect x="-0.9" y={-w/2 - 0.2} width={len + 1.8} height="1.0" fill={`url(#${uid}-rail)`} rx="0.35" stroke={rDarker} strokeWidth="0.1"/>
                <rect x="-0.9" y={w/2 - 0.8} width={len + 1.8} height="1.0" fill={`url(#${uid}-rail)`} rx="0.35" stroke={rDarker} strokeWidth="0.1"/>
                {/* top highlight along each rail */}
                <line x1="-0.5" y1={-w/2 + 0.0} x2={len + 0.5} y2={-w/2 + 0.0} stroke="white" strokeWidth="0.2" opacity="0.85" strokeLinecap="round"/>
                <line x1="-0.5" y1={w/2 - 0.6} x2={len + 0.5} y2={w/2 - 0.6} stroke="white" strokeWidth="0.2" opacity="0.85" strokeLinecap="round"/>
                {/* rungs with depth */}
                {Array.from({ length: numRungs }).map((_, i) => {
                  const t = (i + 0.5) / numRungs;
                  const cx = t * len;
                  return (
                    <g key={'rs' + i}>
                      {/* rung back/underside */}
                      <rect x={cx - 0.42} y={-w/2 + 0.5} width="0.92" height={w - 0.2} fill={rDarker}/>
                      {/* rung front */}
                      <rect x={cx - 0.45} y={-w/2 + 0.25} width="0.9" height={w - 0.4} fill={`url(#${uid}-rung)`} rx="0.2" stroke={rDarker} strokeWidth="0.08"/>
                      {/* sheen */}
                      <line x1={cx - 0.35} y1={-w/2 + 0.4} x2={cx - 0.35} y2={w/2 - 0.3} stroke="white" strokeWidth="0.12" opacity="0.7"/>
                    </g>
                  );
                })}
                {/* end caps bolts */}
                {[[-0.3, -w/2 + 0.3], [len + 0.3, -w/2 + 0.3], [-0.3, w/2 - 0.3], [len + 0.3, w/2 - 0.3]].map(([bx, by], i) => (
                  <g key={'b' + i}>
                    <circle cx={bx} cy={by} r="0.4" fill={rLight}/>
                    <circle cx={bx - 0.1} cy={by - 0.1} r="0.15" fill="white" opacity="0.8"/>
                    <circle cx={bx} cy={by} r="0.18" fill={rDarker}/>
                  </g>
                ))}
              </g>
            );
          })}

          {/* ======== CHUTES as PLAYGROUND SLIDES (open curved slides) ======== */}
          {CHUTES_LIST.map(({ from, to, color, spiral, portal }) => {
            const shadeHex = (hex, amt) => {
              const n = parseInt(hex.slice(1), 16);
              const r = Math.max(0, Math.min(255, ((n >> 16) & 255) + amt));
              const g = Math.max(0, Math.min(255, ((n >> 8) & 255) + amt));
              const bl = Math.max(0, Math.min(255, (n & 255) + amt));
              return `rgb(${r|0},${g|0},${bl|0})`;
            };
            if (portal) {
              const p = squareToPct(+from);
              const uidP = `portal-${from}`;
              const cL = shadeHex(color, 90);
              const cM = color;
              const cD = shadeHex(color, -40);
              const cDD = shadeHex(color, -80);
              return (
                <g key={'p' + from}>
                  <defs>
                    <radialGradient id={`${uidP}-core`} cx="0.5" cy="0.5" r="0.55">
                      <stop offset="0%" stopColor="#fff" stopOpacity="1"/>
                      <stop offset="18%" stopColor={cL} stopOpacity="0.95"/>
                      <stop offset="55%" stopColor={cM} stopOpacity="0.85"/>
                      <stop offset="90%" stopColor={cD} stopOpacity="0.5"/>
                      <stop offset="100%" stopColor={cDD} stopOpacity="0"/>
                    </radialGradient>
                    <radialGradient id={`${uidP}-ring`} cx="0.5" cy="0.5" r="0.5">
                      <stop offset="0%" stopColor={cL} stopOpacity="0"/>
                      <stop offset="75%" stopColor={cM} stopOpacity="0.7"/>
                      <stop offset="100%" stopColor={cDD} stopOpacity="0"/>
                    </radialGradient>
                  </defs>
                  {/* cast shadow */}
                  <ellipse cx={p.x + 0.8} cy={p.y + 1.2} rx="5" ry="1.5" fill="#000" opacity="0.3" filter="url(#castShadowSoft)"/>
                  {/* outer ring */}
                  <circle cx={p.x} cy={p.y} r="4.4" fill={`url(#${uidP}-ring)`}/>
                  {/* swirl arms.  transform-box: fill-box + transform-origin: center makes the
                      rotation pivot on the group's own bbox center in SVG user units — so the
                      animation stays locked to the portal cell at every zoom level. Using CSS
                      px for transform-origin drifts because px ≠ SVG units after zoom scaling. */}
                  <g style={{ transformBox: 'fill-box', transformOrigin: 'center', animation: 'portal-spin 4s linear infinite' }}>
                    {[0, 60, 120, 180, 240, 300].map((deg, i) => (
                      <path
                        key={i}
                        d={`M ${p.x} ${p.y} m -0.4 0 a 3.4 3.4 0 0 1 3.4 -3.4`}
                        transform={`rotate(${deg} ${p.x} ${p.y})`}
                        fill="none"
                        stroke={cL}
                        strokeWidth="0.55"
                        strokeLinecap="round"
                        opacity="0.85"
                      />
                    ))}
                  </g>
                  {/* inner counter-rotating swirl */}
                  <g style={{ transformBox: 'fill-box', transformOrigin: 'center', animation: 'portal-spin-rev 2.5s linear infinite' }}>
                    {[30, 150, 270].map((deg, i) => (
                      <path
                        key={i}
                        d={`M ${p.x} ${p.y} m -0.3 0 a 2.2 2.2 0 0 1 2.2 -2.2`}
                        transform={`rotate(${deg} ${p.x} ${p.y})`}
                        fill="none"
                        stroke="#fff"
                        strokeWidth="0.45"
                        strokeLinecap="round"
                        opacity="0.9"
                      />
                    ))}
                  </g>
                  {/* glowing core */}
                  <circle cx={p.x} cy={p.y} r="3.4" fill={`url(#${uidP}-core)`}
                    style={{ transformBox: 'fill-box', transformOrigin: 'center', animation: 'portal-pulse 1.6s ease-in-out infinite' }}/>
                  {/* star specks orbiting */}
                  <g style={{ transformBox: 'fill-box', transformOrigin: 'center', animation: 'portal-spin 3s linear infinite' }}>
                    {[0, 72, 144, 216, 288].map((deg, i) => {
                      const rad = 3.9;
                      const ang = deg * Math.PI / 180;
                      return (
                        <circle key={i}
                          cx={p.x + Math.cos(ang) * rad}
                          cy={p.y + Math.sin(ang) * rad}
                          r="0.35" fill="#fff" opacity="0.95"/>
                      );
                    })}
                  </g>
                </g>
              );
            }
            if (spiral) {
              // Big 3D coiled water-slide tube — inspired by a real spiral water slide.
              // Uses the shared spiral geometry (same path data drives the token's slide animation).
              const geo = computeSpiralGeometry(+from, +to);
              const { a, b, arches, boundaries } = geo;
              const uidS = `sp-${from}`;
              const cL = shadeHex(color, 90);
              const cM = color;
              const cD = shadeHex(color, -45);
              const cDD = shadeHex(color, -85);
              const cDDD = shadeHex(color, -115);
              const tubeW = SPIRAL_TUBE_W;
              const archR = SPIRAL_ARCH_R;
              return (
                <g key={'s' + from}>
                  <defs>
                    {/* Horizontal gradient gives the tube a cylindrical "round" feel along its length */}
                    <linearGradient id={`${uidS}-tube`} x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={cL}/>
                      <stop offset="30%" stopColor={cM}/>
                      <stop offset="72%" stopColor={cD}/>
                      <stop offset="100%" stopColor={cDD}/>
                    </linearGradient>
                    {/* Inner bore (dark tube interior seen from ends & junctions) */}
                    <radialGradient id={`${uidS}-bore`} cx="0.5" cy="0.4" r="0.6">
                      <stop offset="0%" stopColor={cDDD} stopOpacity="0.95"/>
                      <stop offset="60%" stopColor={cDDD} stopOpacity="0.7"/>
                      <stop offset="100%" stopColor={cDD} stopOpacity="0.1"/>
                    </radialGradient>
                    <filter id={`${uidS}-pop`} x="-30%" y="-30%" width="160%" height="160%">
                      <feGaussianBlur in="SourceAlpha" stdDeviation="1.6"/>
                      <feOffset dx="1.2" dy="2.4" result="offsetblur"/>
                      <feComponentTransfer>
                        <feFuncA type="linear" slope="0.55"/>
                      </feComponentTransfer>
                      <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                      </feMerge>
                    </filter>
                  </defs>

                  {/* Big, chunky ground shadow underneath */}
                  <g transform="translate(2.4 3.8)" opacity="0.55" filter="url(#castShadowHeavy)">
                    {arches.map((ar, i) => (
                      <path key={'shd' + i}
                        d={`M ${ar.s.x} ${ar.s.y} Q ${ar.ctrl.x} ${ar.ctrl.y} ${ar.e.x} ${ar.e.y}`}
                        fill="none" stroke="#000" strokeWidth={tubeW + 2.0} strokeLinecap="round"/>
                    ))}
                  </g>

                  {/* BACK arches — darker, drawn first so front arches cover them */}
                  {arches.filter(ar => !ar.isFront).map((ar, i) => (
                    <g key={'bk' + i}>
                      <path
                        d={`M ${ar.s.x} ${ar.s.y} Q ${ar.ctrl.x} ${ar.ctrl.y} ${ar.e.x} ${ar.e.y}`}
                        fill="none" stroke={cDDD} strokeWidth={tubeW + 1.0} strokeLinecap="round"/>
                      <path
                        d={`M ${ar.s.x} ${ar.s.y} Q ${ar.ctrl.x} ${ar.ctrl.y} ${ar.e.x} ${ar.e.y}`}
                        fill="none" stroke={cDD} strokeWidth={tubeW + 0.2} strokeLinecap="round" opacity="0.95"/>
                      <path
                        d={`M ${ar.s.x} ${ar.s.y} Q ${ar.ctrl.x} ${ar.ctrl.y} ${ar.e.x} ${ar.e.y}`}
                        fill="none" stroke={cD} strokeWidth={tubeW - 1.3} strokeLinecap="round" opacity="0.9"/>
                      {/* subtle top sheen on back loops */}
                      <path
                        d={`M ${ar.s.x} ${ar.s.y} Q ${ar.ctrl.x} ${ar.ctrl.y + 0.15} ${ar.e.x} ${ar.e.y}`}
                        fill="none" stroke={cL} strokeWidth="0.3" strokeLinecap="round" opacity="0.35"/>
                    </g>
                  ))}

                  {/* Undercarriage stack for front arches — dark offset layers give the tube
                      clear thickness floating above the board (matches open-slide style) */}
                  {arches.filter(ar => ar.isFront).map((ar, i) => (
                    <g key={'un' + i}>
                      <path
                        d={`M ${ar.s.x + 0.9} ${ar.s.y + 1.45} Q ${ar.ctrl.x + 0.9} ${ar.ctrl.y + 1.45} ${ar.e.x + 0.9} ${ar.e.y + 1.45}`}
                        fill="none" stroke={cDDD} strokeWidth={tubeW + 1.0} strokeLinecap="round" opacity="0.85"/>
                      <path
                        d={`M ${ar.s.x + 0.55} ${ar.s.y + 0.9} Q ${ar.ctrl.x + 0.55} ${ar.ctrl.y + 0.9} ${ar.e.x + 0.55} ${ar.e.y + 0.9}`}
                        fill="none" stroke={cDDD} strokeWidth={tubeW + 0.5} strokeLinecap="round"/>
                      <path
                        d={`M ${ar.s.x + 0.25} ${ar.s.y + 0.45} Q ${ar.ctrl.x + 0.25} ${ar.ctrl.y + 0.45} ${ar.e.x + 0.25} ${ar.e.y + 0.45}`}
                        fill="none" stroke={cDD} strokeWidth={tubeW + 0.2} strokeLinecap="round"/>
                    </g>
                  ))}

                  {/* Inner-tube "bore" cross-sections at each coil junction — reads as hollow 3D tube */}
                  {boundaries.map((bp, i) => {
                    if (i === 0 || i === boundaries.length - 1) return null;
                    return (
                      <g key={'cs' + i}>
                        <ellipse cx={bp.x + 0.1} cy={bp.y + 0.3} rx={tubeW * 0.72} ry={tubeW * 0.28} fill="#000" opacity="0.4"/>
                        <ellipse cx={bp.x} cy={bp.y} rx={tubeW * 0.66} ry={tubeW * 0.24} fill={cDDD}/>
                        <ellipse cx={bp.x} cy={bp.y - 0.08} rx={tubeW * 0.58} ry={tubeW * 0.2} fill={`url(#${uidS}-bore)`}/>
                        <ellipse cx={bp.x - tubeW * 0.2} cy={bp.y - 0.22} rx={tubeW * 0.18} ry={tubeW * 0.06} fill="#fff" opacity="0.55"/>
                      </g>
                    );
                  })}

                  {/* FRONT arches — bright, thick, heavy outlines for "pop" */}
                  {arches.filter(ar => ar.isFront).map((ar, i) => {
                    // Sample perpendicular cross-ridges along the tube — gives the closed
                    // tube a ribbed surface texture matching the open-slide cross-ridges.
                    const ridges = [];
                    const N = 10;
                    for (let k = 1; k < N; k++) {
                      const t = k / N;
                      const mt = 1 - t;
                      const x = mt*mt*ar.s.x + 2*mt*t*ar.ctrl.x + t*t*ar.e.x;
                      const y = mt*mt*ar.s.y + 2*mt*t*ar.ctrl.y + t*t*ar.e.y;
                      const tx = 2*mt*(ar.ctrl.x - ar.s.x) + 2*t*(ar.e.x - ar.ctrl.x);
                      const ty = 2*mt*(ar.ctrl.y - ar.s.y) + 2*t*(ar.e.y - ar.ctrl.y);
                      const L = Math.hypot(tx, ty) || 1;
                      const pnx = -ty / L, pny = tx / L;
                      const w2 = tubeW * 0.45;
                      ridges.push({
                        x1: x + pnx * w2, y1: y + pny * w2,
                        x2: x - pnx * w2, y2: y - pny * w2,
                      });
                    }
                    return (
                      <g key={'fr' + i}>
                        {/* Heavy dark outer rim */}
                        <path
                          d={`M ${ar.s.x} ${ar.s.y} Q ${ar.ctrl.x} ${ar.ctrl.y} ${ar.e.x} ${ar.e.y}`}
                          fill="none" stroke={cDDD} strokeWidth={tubeW + 1.6} strokeLinecap="round"/>
                        {/* Mid-tone tube body */}
                        <path
                          d={`M ${ar.s.x} ${ar.s.y} Q ${ar.ctrl.x} ${ar.ctrl.y} ${ar.e.x} ${ar.e.y}`}
                          fill="none" stroke={`url(#${uidS}-tube)`} strokeWidth={tubeW + 0.2} strokeLinecap="round"/>
                        {/* Cross-ridges (ribbed texture wrapping the tube) */}
                        {ridges.map((r, k) => (
                          <line key={'rd' + k}
                            x1={r.x1} y1={r.y1} x2={r.x2} y2={r.y2}
                            stroke={cDDD} strokeWidth="0.2" strokeLinecap="round" opacity="0.5"/>
                        ))}
                        {/* Highlight band along top (where light hits) */}
                        <path
                          d={`M ${ar.s.x} ${ar.s.y - 0.45} Q ${ar.ctrl.x} ${ar.ctrl.y - 0.7} ${ar.e.x} ${ar.e.y - 0.45}`}
                          fill="none" stroke={cL} strokeWidth="1.1" strokeLinecap="round" opacity="0.95"/>
                        {/* Glossy white shine */}
                        <path
                          d={`M ${ar.s.x + 0.3} ${ar.s.y - 0.58} Q ${ar.ctrl.x} ${ar.ctrl.y - 0.9} ${ar.e.x - 0.3} ${ar.e.y - 0.58}`}
                          fill="none" stroke="#fff" strokeWidth="0.5" strokeLinecap="round" opacity="0.85"/>
                        {/* Deep bottom shadow line (reinforces cylindrical roundness) */}
                        <path
                          d={`M ${ar.s.x} ${ar.s.y + 0.5} Q ${ar.ctrl.x} ${ar.ctrl.y + 0.7} ${ar.e.x} ${ar.e.y + 0.5}`}
                          fill="none" stroke={cDDD} strokeWidth="0.85" strokeLinecap="round" opacity="0.7"/>
                      </g>
                    );
                  })}

                  {/* Entry funnel — dramatic opening at top of slide */}
                  <g transform={`translate(${a.x} ${a.y})`}>
                    <ellipse cx="1.1" cy="1.8" rx={archR * 1.15} ry={archR * 0.48} fill="#000" opacity="0.5" filter="url(#castShadowHeavy)"/>
                    <ellipse cx="0" cy="0.5" rx={archR * 0.95} ry={archR * 0.5} fill={cDDD}/>
                    <ellipse cx="0" cy="0.15" rx={archR * 0.95} ry={archR * 0.5} fill={cDD}/>
                    <ellipse cx="0" cy="0" rx={archR * 0.95} ry={archR * 0.5} fill={`url(#${uidS}-tube)`} stroke={cDDD} strokeWidth="0.35"/>
                    {/* bore (opening) */}
                    <ellipse cx="0" cy="-0.12" rx={archR * 0.7} ry={archR * 0.38} fill={cDDD}/>
                    <ellipse cx="0" cy="-0.12" rx={archR * 0.7} ry={archR * 0.38} fill={`url(#${uidS}-bore)`}/>
                    <ellipse cx="0" cy="-0.1" rx={archR * 0.55} ry={archR * 0.3} fill="#000" opacity="0.55"/>
                    {/* rim highlights */}
                    <ellipse cx="-1.2" cy="-0.75" rx={archR * 0.38} ry={archR * 0.1} fill="#fff" opacity="0.75"/>
                    <ellipse cx="0.8" cy="0.25" rx={archR * 0.28} ry={archR * 0.08} fill={cL} opacity="0.5"/>
                  </g>

                  {/* Exit funnel — mouth of slide where you come out */}
                  <g transform={`translate(${b.x} ${b.y})`}>
                    <ellipse cx="1.0" cy="1.8" rx={archR * 1.1} ry={archR * 0.42} fill="#000" opacity="0.5" filter="url(#castShadowHeavy)"/>
                    <ellipse cx="0" cy="0.5" rx={archR * 1.0} ry={archR * 0.52} fill={cDDD}/>
                    <ellipse cx="0" cy="0.15" rx={archR * 1.0} ry={archR * 0.52} fill={cDD}/>
                    <ellipse cx="0" cy="0" rx={archR * 1.0} ry={archR * 0.52} fill={`url(#${uidS}-tube)`} stroke={cDDD} strokeWidth="0.35"/>
                    <ellipse cx="0" cy="-0.12" rx={archR * 0.74} ry={archR * 0.4} fill={cDDD}/>
                    <ellipse cx="0" cy="-0.12" rx={archR * 0.74} ry={archR * 0.4} fill={`url(#${uidS}-bore)`}/>
                    <ellipse cx="0" cy="-0.1" rx={archR * 0.6} ry={archR * 0.32} fill="#000" opacity="0.5"/>
                    <ellipse cx="-1.3" cy="-0.8" rx={archR * 0.4} ry={archR * 0.1} fill="#fff" opacity="0.75"/>
                    <ellipse cx="0.9" cy="0.25" rx={archR * 0.3} ry={archR * 0.08} fill={cL} opacity="0.5"/>
                  </g>
                </g>
              );
            }
            const a = squareToPct(+from);  // TOP of slide (high square)
            const b = squareToPct(+to);    // BOTTOM exit (low square)
            const dx = b.x - a.x, dy = b.y - a.y;
            const len = Math.hypot(dx, dy);
            const nx = -dy / len, ny = dx / len;
            // S-curve via two control points
            const bulge1 = Math.min(7, len * 0.25);
            const bulge2 = Math.min(7, len * 0.25);
            const c1x = a.x + dx * 0.33 + nx * bulge1;
            const c1y = a.y + dy * 0.33 + ny * bulge1;
            const c2x = a.x + dx * 0.66 - nx * bulge2;
            const c2y = a.y + dy * 0.66 - ny * bulge2;

            const shade = (hex, amt) => {
              const n = parseInt(hex.slice(1), 16);
              const r = Math.max(0, Math.min(255, ((n >> 16) & 255) + amt));
              const g = Math.max(0, Math.min(255, ((n >> 8) & 255) + amt));
              const bl = Math.max(0, Math.min(255, (n & 255) + amt));
              return `rgb(${r|0},${g|0},${bl|0})`;
            };
            const cLight = shade(color, 70);
            const cMid = color;
            const cDark = shade(color, -50);
            const cDarker = shade(color, -90);
            const uid = `sl-${from}`;

            // slide width constant along length (open slide)
            const wSlide = 3.2;

            // Sample cubic Bezier
            const sample = (t) => {
              const mt = 1 - t;
              return {
                x: mt*mt*mt*a.x + 3*mt*mt*t*c1x + 3*mt*t*t*c2x + t*t*t*b.x,
                y: mt*mt*mt*a.y + 3*mt*mt*t*c1y + 3*mt*t*t*c2y + t*t*t*b.y,
                tx: 3*mt*mt*(c1x-a.x) + 6*mt*t*(c2x-c1x) + 3*t*t*(b.x-c2x),
                ty: 3*mt*mt*(c1y-a.y) + 6*mt*t*(c2y-c1y) + 3*t*t*(b.y-c2y),
              };
            };

            const steps = 50;
            const centerline = [];
            for (let i = 0; i <= steps; i++) {
              const t = i / steps;
              centerline.push({ t, ...sample(t) });
            }

            // width grows slightly at exit (flare)
            const widthAt = (t) => wSlide * (1 + t * 0.15);

            // Build polygon for the slide surface (bed)
            const top = [], bot = [];
            centerline.forEach(({ t, x, y, tx, ty }) => {
              const L = Math.hypot(tx, ty) || 1;
              const pnx = -ty / L, pny = tx / L;
              const w2 = widthAt(t) / 2;
              top.push([x + pnx * w2, y + pny * w2]);
              bot.push([x - pnx * w2, y - pny * w2]);
            });
            const bedPoints = [...top, ...bot.reverse()].map(p => `${p[0]},${p[1]}`).join(' ');

            // Side-rail paths (open slide walls): traced along each edge with some offset,
            // with a raised rim gradient for 3D
            const rail1 = top.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0]} ${p[1]}`).join(' ');
            const rail2 = bot.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0]} ${p[1]}`).join(' ');

            // Entry ladder top marker (small platform)
            const entry = sample(0);
            const entryAng = Math.atan2(entry.ty, entry.tx) * 180 / Math.PI;
            const exit_ = sample(1);
            const exitAng = Math.atan2(exit_.ty, exit_.tx) * 180 / Math.PI;

            return (
              <g key={'c' + from}>
                <defs>
                  {/* Slide surface gradient — bright light center, darker edges for concave feel */}
                  <linearGradient id={`${uid}-bed`} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={cDark}/>
                    <stop offset="50%" stopColor={cLight}/>
                    <stop offset="100%" stopColor={cDark}/>
                  </linearGradient>
                  {/* Rail gradient — bright top, dark underside */}
                  <linearGradient id={`${uid}-rail`} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={cLight}/>
                    <stop offset="100%" stopColor={cDarker}/>
                  </linearGradient>
                </defs>

                {/* ==== dramatic multi-layer cast shadow (big blur, offset down-right) ==== */}
                <g opacity="0.4" transform="translate(2.2 3.0)" filter="url(#castShadowHeavy)">
                  <polygon points={bedPoints} fill="#000"/>
                </g>
                <g opacity="0.3" transform="translate(1.4 2.0)" filter="url(#castShadowSoft)">
                  <polygon points={bedPoints} fill="#000"/>
                </g>

                {/* ==== DEEP undercarriage stack — makes slide clearly float above board ==== */}
                {/* bottom-most dark layer */}
                <polygon
                  points={top.concat(bot.slice().reverse()).map(p => `${p[0] + 0.9},${p[1] + 1.4}`).join(' ')}
                  fill={cDarker} opacity="0.9"
                />
                {/* mid layer */}
                <polygon
                  points={top.concat(bot.slice().reverse()).map(p => `${p[0] + 0.55},${p[1] + 0.9}`).join(' ')}
                  fill={cDarker}
                />
                {/* top of undercarriage (darker rim right before bed) */}
                <polygon
                  points={top.concat(bot.slice().reverse()).map(p => `${p[0] + 0.25},${p[1] + 0.45}`).join(' ')}
                  fill={cDark}
                />

                {/* slide bed */}
                <polygon points={bedPoints} fill={`url(#${uid}-bed)`} stroke={cDarker} strokeWidth="0.15"/>

                {/* cross-ridges along slide for texture */}
                {centerline.filter((_, i) => i > 2 && i < steps - 2 && i % 3 === 0).map(({ x, y, tx, ty, t }, i) => {
                  const L = Math.hypot(tx, ty) || 1;
                  const pnx = -ty / L, pny = tx / L;
                  const w2 = widthAt(t) / 2 * 0.92;
                  return (
                    <line key={'r' + i}
                      x1={x + pnx * w2} y1={y + pny * w2}
                      x2={x - pnx * w2} y2={y - pny * w2}
                      stroke={cDarker} strokeWidth="0.12" opacity="0.4"
                    />
                  );
                })}

                {/* center glide highlight down the slide */}
                {showGlidePath && (
                <polyline
                  points={centerline.map(({ x, y, tx, ty, t }) => {
                    const L = Math.hypot(tx, ty) || 1;
                    const pnx = -ty / L, pny = tx / L;
                    const w2 = widthAt(t) / 2 * 0.15;
                    return `${x + pnx * w2 * 0.2},${y + pny * w2 * 0.2}`;
                  }).join(' ')}
                  fill="none" stroke="white" strokeWidth="0.7" opacity="0.45" strokeLinecap="round"
                />
                )}

                {/* ==== SIDE RAILS (raised walls) — key playground-slide feature ==== */}
                {/* rail 1 back shadow */}
                <path d={rail1} fill="none" stroke={cDarker} strokeWidth="0.9" strokeLinecap="round" transform="translate(0.15 0.35)"/>
                <path d={rail2} fill="none" stroke={cDarker} strokeWidth="0.9" strokeLinecap="round" transform="translate(0.15 0.35)"/>
                {/* rail main body */}
                <path d={rail1} fill="none" stroke={`url(#${uid}-rail)`} strokeWidth="0.65" strokeLinecap="round"/>
                <path d={rail2} fill="none" stroke={`url(#${uid}-rail)`} strokeWidth="0.65" strokeLinecap="round"/>
                {/* rail top highlight */}
                <path d={rail1} fill="none" stroke="white" strokeWidth="0.2" strokeLinecap="round" opacity="0.8"/>
                <path d={rail2} fill="none" stroke="white" strokeWidth="0.2" strokeLinecap="round" opacity="0.8"/>

                {/* ==== ENTRY PLATFORM (at top/high square) ==== */}
                <g transform={`translate(${entry.x} ${entry.y}) rotate(${entryAng - 90})`}>
                  {/* shadow */}
                  <ellipse cx="0.3" cy="0.6" rx={wSlide * 1.1} ry={wSlide * 0.55} fill="#000" opacity="0.3" filter="url(#castShadowSoft)"/>
                  {/* platform base (darker) */}
                  <ellipse cx="0" cy="0.25" rx={wSlide * 0.95} ry={wSlide * 0.45} fill={cDarker}/>
                  {/* platform top */}
                  <ellipse cx="0" cy="0" rx={wSlide * 0.95} ry={wSlide * 0.45} fill={`url(#${uid}-bed)`} stroke={cDarker} strokeWidth="0.15"/>
                  {/* highlight */}
                  <ellipse cx="-0.6" cy="-0.25" rx={wSlide * 0.5} ry={wSlide * 0.15} fill="white" opacity="0.35"/>
                  {/* little safety rail posts on either side */}
                  <g>
                    <rect x={-wSlide * 0.85} y={-wSlide * 0.9} width="0.45" height={wSlide * 0.9} fill={cDark} rx="0.15"/>
                    <rect x={-wSlide * 0.85} y={-wSlide * 0.9} width="0.2" height={wSlide * 0.9} fill={cLight} rx="0.08"/>
                    <circle cx={-wSlide * 0.85 + 0.22} cy={-wSlide * 0.9} r="0.32" fill={cLight} stroke={cDarker} strokeWidth="0.1"/>
                    <rect x={wSlide * 0.4} y={-wSlide * 0.9} width="0.45" height={wSlide * 0.9} fill={cDark} rx="0.15"/>
                    <rect x={wSlide * 0.4} y={-wSlide * 0.9} width="0.2" height={wSlide * 0.9} fill={cLight} rx="0.08"/>
                    <circle cx={wSlide * 0.4 + 0.22} cy={-wSlide * 0.9} r="0.32" fill={cLight} stroke={cDarker} strokeWidth="0.1"/>
                    {/* horizontal bar connecting posts */}
                    <rect x={-wSlide * 0.85 + 0.22} y={-wSlide * 0.9 - 0.1} width={wSlide * 1.25} height="0.3" fill={cLight} rx="0.1" stroke={cDarker} strokeWidth="0.08"/>
                  </g>
                </g>

                {/* ==== EXIT FLARE (at bottom/low square) ==== */}
                <g transform={`translate(${exit_.x} ${exit_.y}) rotate(${exitAng - 90})`}>
                  {/* shadow */}
                  <ellipse cx="0.3" cy="0.5" rx={wSlide * 1.0} ry={wSlide * 0.35} fill="#000" opacity="0.3" filter="url(#castShadowSoft)"/>
                  {/* lip underside */}
                  <path d={`M ${-wSlide * 0.8} 0 Q 0 ${wSlide * 0.55} ${wSlide * 0.8} 0`} fill={cDarker}/>
                  {/* lip top */}
                  <path d={`M ${-wSlide * 0.8} -0.1 Q 0 ${wSlide * 0.45} ${wSlide * 0.8} -0.1 L ${wSlide * 0.65} -0.25 Q 0 ${wSlide * 0.25} ${-wSlide * 0.65} -0.25 Z`}
                    fill={`url(#${uid}-rail)`} stroke={cDarker} strokeWidth="0.12"/>
                  {/* highlight on lip */}
                  <path d={`M ${-wSlide * 0.55} 0.0 Q 0 ${wSlide * 0.28} ${wSlide * 0.55} 0.0`} stroke="white" strokeWidth="0.18" fill="none" opacity="0.75"/>
                </g>
              </g>
            );
          })}
        </svg>

        {/* Tokens */}
        <div className="tokens">
          {players.map((p, i) => {
            const sq = tokenPositions[i];
            const override = tokenOverride && tokenOverride[i];
            if (sq < 1 && !override) return null;
            // If overridden (e.g. during spiral slide), use exact x/y path coords; else use square center
            const base = override ? { x: override.x, y: override.y } : squareToPct(sq);
            // offset so multiple tokens on same square don't overlap completely
            const sameSquareIdx = override ? 0 : players
              .map((_, j) => j)
              .filter(j => tokenPositions[j] === sq)
              .indexOf(i);
            const ox = override ? 0 : (sameSquareIdx % 2) * 3.5 - 1.75;
            const oy = override ? 0 : Math.floor(sameSquareIdx / 2) * 3.5 - 1.75;
            const x = base.x, y = base.y;
            const isCurrent = i === currentPlayerIdx;
            const isMoving = isCurrent && phase === 'moving';
            const isClimbing = isCurrent && phase === 'climbing';
            const isSliding = isCurrent && phase === 'sliding';
            const isPortaling = isCurrent && phase === 'portaling';
            const isSpiraling = isCurrent && phase === 'spiraling';
            return (
              <div
                key={p.id}
                className={`token ${isCurrent ? 'current' : ''} ${p.isAI ? 'robot-token' : ''} ${isMoving ? 'hopping' : ''} ${isClimbing ? 'climbing' : ''} ${isSliding ? 'sliding' : ''} ${isPortaling ? 'portaling' : ''} ${isSpiraling ? 'spiraling' : ''}`}
                style={{
                  left: `${x + ox}%`,
                  top: `${y + oy}%`,
                  '--pcolor': p.color,
                }}
              >
                {p.isAI ? (
                  <svg viewBox="0 0 24 24" width="70%" height="70%">
                    <rect x="5" y="7" width="14" height="12" rx="3" fill="white"/>
                    <circle cx="9" cy="13" r="1.6" fill={p.color}/>
                    <circle cx="15" cy="13" r="1.6" fill={p.color}/>
                    <rect x="10" y="16" width="4" height="1.2" rx="0.6" fill={p.color}/>
                    <rect x="11" y="4" width="2" height="3" fill="white"/>
                    <circle cx="12" cy="3.5" r="1.2" fill="white"/>
                  </svg>
                ) : p.charId ? (
                  <div style={{width:'130%',height:'130%',display:'flex',alignItems:'center',justifyContent:'center',transform:'translateY(-8%)'}}>
                    <Character charId={p.charId} size={'100%'}/>
                  </div>
                ) : (
                  <span className="token-label">{p.label}</span>
                )}
              </div>
            );
          })}
          {/* FX layer: sparkles on climb, speed-lines on slide */}
          {(() => {
            const curSq = tokenPositions[currentPlayerIdx];
            if (!curSq || curSq < 1) return null;
            const { x, y } = squareToPct(curSq);
            if (phase === 'climbing') {
              return (
                <div className="fx-sparkles" style={{ left: `${x}%`, top: `${y}%` }}>
                  {[...Array(8)].map((_, i) => (
                    <span key={i} className="spark" style={{ '--i': i, '--ang': `${i * 45}deg` }}/>
                  ))}
                </div>

// 3D-styled character roster — each is a layered SVG with gradients, highlights, shadow
const CHARACTERS = [
  { id: 'coco',   name: 'Coco',   color: '#6d4a2e' },
  { id: 'ember',  name: 'Ember',  color: '#ff8a3d' },
  { id: 'ziggy',  name: 'Ziggy',  color: '#a855a0' },
  { id: 'bolt',   name: 'Bolt',   color: '#e8b23e' },
  { id: 'mochi',  name: 'Mochi',  color: '#f6c6d4' },
  { id: 'luna',   name: 'Luna',   color: '#5b6cff' },
  { id: 'fern',   name: 'Fern',   color: '#2a8a5f' },
  { id: 'pip',    name: 'Pip',    color: '#e8583e' },
];

function Character({ charId, size = 56, spin = false }) {
  const c = CHARACTERS.find(x => x.id === charId) || CHARACTERS[0];
  const darken = (hex, amt = 0.25) => {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.max(0, ((n >> 16) & 255) * (1 - amt));
    const g = Math.max(0, ((n >> 8) & 255) * (1 - amt));
    const b = Math.max(0, (n & 255) * (1 - amt));
    return `rgb(${r|0}, ${g|0}, ${b|0})`;
  };
  const lighten = (hex, amt = 0.3) => {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, ((n >> 16) & 255) + 255 * amt);
    const g = Math.min(255, ((n >> 8) & 255) + 255 * amt);
    const b = Math.min(255, (n & 255) + 255 * amt);
    return `rgb(${r|0}, ${g|0}, ${b|0})`;
  };
  const base = c.color;
  const dark = darken(base, 0.4);
  const darker = darken(base, 0.65);
  const light = lighten(base, 0.35);
  const lighter = lighten(base, 0.7);
  const uid = c.id;

  // ======== True 3D shading defs ========
  // Every character uses: body sphere gradient (key light top-left), rim light (bottom-right),
  // glossy specular highlight, soft ground shadow.
  const defs = (
    <defs>
      {/* Main body sphere — warm key light from upper-left */}
      <radialGradient id={`body-${uid}`} cx="0.32" cy="0.25" r="0.85" fx="0.28" fy="0.22">
        <stop offset="0%" stopColor={lighter}/>
        <stop offset="25%" stopColor={light}/>
        <stop offset="60%" stopColor={base}/>
        <stop offset="95%" stopColor={dark}/>
        <stop offset="100%" stopColor={darker}/>
      </radialGradient>
      {/* Rim / bounce light from bottom-right */}
      <radialGradient id={`rim-${uid}`} cx="0.78" cy="0.82" r="0.4">
        <stop offset="0%" stopColor={light} stopOpacity="0.75"/>
        <stop offset="70%" stopColor={base} stopOpacity="0"/>
      </radialGradient>
      {/* Hard glossy specular dot */}
      <radialGradient id={`spec-${uid}`} cx="0.32" cy="0.22" r="0.18">
        <stop offset="0%" stopColor="white" stopOpacity="0.95"/>
        <stop offset="60%" stopColor="white" stopOpacity="0.3"/>
        <stop offset="100%" stopColor="white" stopOpacity="0"/>
      </radialGradient>
      {/* Ambient occlusion / core shadow near ground */}
      <radialGradient id={`ao-${uid}`} cx="0.5" cy="0.95" r="0.5">
        <stop offset="0%" stopColor={darker} stopOpacity="0.55"/>
        <stop offset="70%" stopColor={darker} stopOpacity="0"/>
      </radialGradient>
      {/* Eye sphere */}
      <radialGradient id={`eye-${uid}`} cx="0.35" cy="0.3" r="0.8">
        <stop offset="0%" stopColor="#ffffff"/>
        <stop offset="75%" stopColor="#dcdfe6"/>
        <stop offset="100%" stopColor="#9fa4b2"/>
      </radialGradient>
      {/* Pupil */}
      <radialGradient id={`pupil-${uid}`} cx="0.4" cy="0.35" r="0.6">
        <stop offset="0%" stopColor="#2a3144"/>
        <stop offset="100%" stopColor="#0a0d14"/>
      </radialGradient>
      {/* Cheek blush */}
      <radialGradient id={`blush-${uid}`} cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stopColor="#ff7a8e" stopOpacity="0.55"/>
        <stop offset="100%" stopColor="#ff7a8e" stopOpacity="0"/>
      </radialGradient>
      {/* Soft blur for cast shadow */}
      <filter id={`blur-${uid}`} x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="0.6"/>
      </filter>
      <filter id={`softblur-${uid}`}>
        <feGaussianBlur stdDeviation="0.25"/>
      </filter>
    </defs>
  );

  // 3D eye: white sphere with shaded pupil and catch-light
  const eye3D = (cx, cy, r = 1.1) => (
    <g>
      <ellipse cx={cx + 0.08} cy={cy + 0.15} rx={r * 1.05} ry={r * 1.05} fill="#000" opacity="0.15" filter={`url(#softblur-${uid})`}/>
      <circle cx={cx} cy={cy} r={r} fill={`url(#eye-${uid})`}/>
      <circle cx={cx + 0.1} cy={cy + 0.15} r={r * 0.55} fill={`url(#pupil-${uid})`}/>
      <circle cx={cx - 0.15} cy={cy - 0.2} r={r * 0.25} fill="white" opacity="0.95"/>
      <circle cx={cx + 0.3} cy={cy + 0.3} r={r * 0.1} fill="white" opacity="0.7"/>
    </g>
  );

  // Mouth with depth — small dark pill with highlight on lower lip
  const mouth3D = (cx, cy, w = 1.6) => (
    <g>
      <path d={`M ${cx - w/2} ${cy} Q ${cx} ${cy + 0.8} ${cx + w/2} ${cy}`} stroke={darker} strokeWidth="0.35" fill="#3a1a1a" strokeLinecap="round"/>
      <path d={`M ${cx - w/2 + 0.2} ${cy + 0.2} Q ${cx} ${cy + 0.5} ${cx + w/2 - 0.2} ${cy + 0.2}`} stroke="#ff9aa5" strokeWidth="0.15" fill="none" opacity="0.6"/>
    </g>
  );

  // Blush cheeks
  const cheeks = (ly, scale = 1) => (
    <g>
      <ellipse cx="8" cy={ly} rx={1.1 * scale} ry={0.7 * scale} fill={`url(#blush-${uid})`}/>
      <ellipse cx="16" cy={ly} rx={1.1 * scale} ry={0.7 * scale} fill={`url(#blush-${uid})`}/>
    </g>
  );

  // Shared shaded body (sphere layers) — renders 3D sphere shading at given shape
  const sphereShade = (shapeEl) => (
    <>
      {shapeEl({ fill: `url(#body-${uid})` })}
      {shapeEl({ fill: `url(#rim-${uid})` })}
      {shapeEl({ fill: `url(#ao-${uid})` })}
      {shapeEl({ fill: `url(#spec-${uid})` })}
    </>
  );

  // Cast shadow on ground
  const groundShadow = (
    <ellipse cx="12" cy="22.5" rx="6.5" ry="0.9" fill="#000" opacity="0.28" filter={`url(#blur-${uid})`}/>
  );

  // ---------- Bodies ----------
  const bodies = {
    // Bolt — glossy 3D star
    bolt: (() => {
      const star = (props) => (
        <path d="M 12 2.5 L 14.6 8.4 L 21 9.1 L 16.2 13.4 L 17.8 19.8 L 12 16.5 L 6.2 19.8 L 7.8 13.4 L 3 9.1 L 9.4 8.4 Z"
          stroke={darker} strokeWidth="0.25" strokeLinejoin="round" {...props}/>
      );
      return (
        <g>

          {sphereShade(star)}
          {eye3D(9.2, 11.5, 0.9)}

          {mouth3D(12, 14, 1.4)}

    // Pip — 3D apple with volumetric leaf and stem
    pip: (() => {
      const body = (props) => (
        <path d="M 12 5.5 C 6 5.5 3 9 3 13.5 C 3 18.5 7 21.5 12 21.5 C 17 21.5 21 18.5 21 13.5 C 21 9 18 5.5 12 5.5 Z"

      return (

          {/* leaf with 3D shading */}
          <defs>
            <linearGradient id={`leaf-${uid}`} x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#5fc98b"/>
              <stop offset="50%" stopColor="#2a8a5f"/>
              <stop offset="100%" stopColor="#164a32"/>
            </linearGradient>
          </defs>
          <path d="M 12.3 4.5 Q 17 2 18 5 Q 15 6.5 12.3 6 Z" fill={`url(#leaf-${uid})`} stroke="#164a32" strokeWidth="0.15"/>
          <path d="M 13 4.8 Q 16 3.5 17.3 4.8" stroke="white" strokeWidth="0.15" fill="none" opacity="0.5"/>
          {/* body spheres */}
          {sphereShade(body)}
          {/* top dimple */}
          <ellipse cx="12" cy="6.3" rx="1" ry="0.4" fill={darker} opacity="0.5"/>
          {eye3D(9.5, 13, 1.1)}
          {eye3D(14.5, 13, 1.1)}
          {mouth3D(12, 15.5, 1.7)}
          {cheeks(16, 1)}
        </g>
      );
    })(),

// === dice.jsx ===
// Dice component

function Dice({ value, rolling, onClick, disabled }) {
  // Pip layouts for each face (using CSS grid 3x3, 1-indexed coords)
  const faces = {
    1: [[2,2]],
    2: [[1,1],[3,3]],
    3: [[1,1],[2,2],[3,3]],
    4: [[1,1],[1,3],[3,1],[3,3]],
    5: [[1,1],[1,3],[2,2],[3,1],[3,3]],
    6: [[1,1],[1,3],[2,1],[2,3],[3,1],[3,3]],
  };

  // For a standard die: opposite faces sum to 7.
  // Face placements on the cube (via translateZ after a pre-rotation):
  //   1 → +Z,  6 → -Z,  2 → +X,  5 → -X,  3 → -Y,  4 → +Y
  // Inner rotation brings the rolled face to +Z (front, facing camera). Combined with the
  // static 3/4-view outer tilt, the rolled value lands on the dominant visible face of the
  // cube — exactly like every dice render on the web.
  const faceRotations = {
    1: { x: 0,   y: 0   },  // already at +Z
    6: { x: 0,   y: 180 },  // -Z → +Z  via rotY(180)
    2: { x: 0,   y: -90 },  // +X → +Z  via rotY(-90)
    5: { x: 0,   y: 90  },  // -X → +Z  via rotY(90)
    3: { x: -90, y: 0   },  // -Y → +Z  via rotX(-90)
    4: { x: 90,  y: 0   },  // +Y → +Z  via rotX(90)
  };

  // During roll: accumulate random full rotations for chaos; settle on the correct target for `value`.
  const [rollTick, setRollTick] = React.useState(0);
  // Initial pose = face-1 target (0,0). The static view tilt in the transform string
  // guarantees the first render is already a chunky 3D cube showing face 1 + top + left.
  // z: tumble rotation on cube's own Z axis; squash: landing compression (1=neutral, <1=squashed)
  const [currentRot, setCurrentRot] = React.useState({ x: 0, y: 0, z: 0, tx: 0, ty: 0, bounce: 0, squash: 1 });
  const wasRolling = React.useRef(false);

  // The cube's inner rotation brings the rolled face to +Z (front). A static view tilt
  // (rotateX -45°, rotateY +25°) applied on top in the transform string gives every rolled
  // face the same chunky 3D angle — rolled face dominant, top and left neighbors visible.
  // Empirically tuned to match the iconic "rolled dice" Rolling visual.
  const idlePoseFor = (v) => faceRotations[v] || faceRotations[1];

  // Value is read via a ref so the tumble effect doesn't restart when the parent rapidly
  // cycles `value` during the shuffle. Only `rolling` transitions drive the animation phases.
  const valueRef = React.useRef(value);
  React.useEffect(() => { valueRef.current = value; }, [value]);

  React.useEffect(() => {
    let raf;
    if (rolling) {
      wasRolling.current = true;
      // 3D tumble: rotate X and Y with exponential decay. Always preserves the 3D cube.
      const start = performance.now();
      const startRot = currentRot;
      const vx0 = 780 + Math.random() * 160;
      const vy0 = 920 + Math.random() * 180;
      const tau = 0.75;
      let lastT = start;
      let accX = 0, accY = 0;
      const tick = (now) => {
        const dt = Math.min(0.04, (now - lastT) / 1000);
        lastT = now;
        const t = (now - start) / 1000;
        const decay = Math.exp(-t / tau);
        accX += vx0 * decay * dt;
        accY += vy0 * decay * dt;
        const x = startRot.x + accX + Math.sin(t * 11) * 4;
        const y = startRot.y + accY + Math.cos(t * 8) * 5;
        const bounce = Math.max(0, (1 - Math.min(1, t / 1.0))) * 12;
        const tx = Math.sin(t * 14) * 2.2;
        const ty = Math.cos(t * 11) * 1.8;
        setCurrentRot({ x, y, z: 0, tx, ty, bounce, squash: 1 });
        raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
    } else if (wasRolling.current) {
      // Clean landing at the face-up pose so the rolled face ends on +Y (top of cube).
      wasRolling.current = false;
      const idle = idlePoseFor(valueRef.current);
      const from = currentRot;
      // Pick nearest multiples of 360 so the settle ends EXACTLY at the face-rotation for `value`,
      // guaranteeing the face displayed matches the rolled number. No extra axes to confuse alignment.
      const finalX = Math.round((from.x - idle.x) / 360) * 360 + idle.x + 360;
      const finalY = Math.round((from.y - idle.y) / 360) * 360 + idle.y + 360;
      const startTime = performance.now();
      const dur = 900;
      const tick = (now) => {
        const p = Math.min(1, (now - startTime) / dur);
        const e = 1 - Math.pow(1 - p, 5); // easeOutQuint
        const wobble = p > 0.75 ? Math.sin((p - 0.75) / 0.25 * Math.PI * 2) * 6 * (1 - p) : 0;
        const tableBounce = p > 0.6
          ? Math.abs(Math.sin((p - 0.6) / 0.4 * Math.PI * 1.5)) * 7 * (1 - p) * (1 - p)
          : 0;
        setCurrentRot({
          x: from.x + (finalX - from.x) * e + wobble * 0.5,
          y: from.y + (finalY - from.y) * e + wobble,
          z: 0,
          tx: from.tx * (1 - e),
          ty: from.ty * (1 - e) - tableBounce,
          bounce: tableBounce,
          squash: 1,
        });
        if (p < 1) raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
    } else {
      // Initial render (or idle refresh): snap to the target face rotation.
      const idle = idlePoseFor(valueRef.current);
      setCurrentRot({ x: idle.x, y: idle.y, z: 0, tx: 0, ty: 0, bounce: 0, squash: 1 });
    }
    return () => raf && cancelAnimationFrame(raf);
  }, [rolling]);

  // Note: we intentionally do NOT snap on value changes. The [rolling]-keyed effect handles
  // all three lifecycle cases (initial mount, tumble start, settle-to-face). Adding a value-keyed
  // snap here would race with the settle animation and clobber its captured `from` state,
  // causing a visible jump at handover.

  const Pip = ({ r, c }) => (
    <span className="d3-pip" style={{ gridRow: r, gridColumn: c }}/>
  );

  // Face pairs are tinted so opposite faces (which are never both visible) share a shade,
  // but each of the three visible-at-once faces has a distinct baseline brightness. This is
  // what sells the 3D illusion: three differently-shaded planes read as a real cube, even
  // when gentle tilts + gentle perspective would otherwise flatten into a rounded rhombus.
  //   pair {1,6}: medium (hero face)
  //   pair {2,5}: darker (left/right shade)
  //   pair {3,4}: brighter (top/bottom — catches the most 'light')
  const faceShade = {
    1: 'medium', 6: 'medium',
    2: 'darker', 5: 'darker',
    3: 'brighter', 4: 'brighter',
  };

  const Face = ({ faceVal, transform }) => (
    <div className={`d3-face shade-${faceShade[faceVal]}`} style={{ transform }}>
      <div className="d3-pips">
        {faces[faceVal].map(([r, c], i) => <Pip key={i} r={r} c={c}/>)}
      </div>
    </div>
  );

  // ==== Throw gesture + physics simulation ====
  // The dice behaves like a real die rolling on a table: it has velocity, decelerates via
  // friction, bounces off the window edges (walls), eventually rests on a face, stays visible
  // for ~2s so the user can read the result, then returns to its home spot.
  const [drag, setDrag] = React.useState({ active: false, dx: 0, dy: 0 });
  // phys mode: 'idle' | 'flying' | 'resting' | 'returning'
  // height: simulated Z-lift in px (die airborne); derived from current speed during flight
  const [phys, setPhys] = React.useState({ mode: 'idle', x: 0, y: 0, rotZ: 0, height: 0 });
  const startRef = React.useRef({ x: 0, y: 0 });
  const lastMoveRef = React.useRef({ x: 0, y: 0, t: 0 });
  const velRef = React.useRef({ vx: 0, vy: 0 });
  const diceBoxRef = React.useRef({ cx: 0, cy: 0, w: 80, h: 80 });
  const physRef = React.useRef({ x: 0, y: 0, vx: 0, vy: 0, rotZ: 0, vrot: 0, running: false, lastT: 0, startT: 0 });
  const rafRef = React.useRef(null);
  const restTimerRef = React.useRef(null);
  const returnTimerRef = React.useRef(null);

  const canInteract = !disabled && !rolling && phys.mode === 'idle';

  const cancelTimers = () => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (restTimerRef.current) clearTimeout(restTimerRef.current);
    if (returnTimerRef.current) clearTimeout(returnTimerRef.current);
    rafRef.current = null;
    restTimerRef.current = null;
    returnTimerRef.current = null;
  };

  React.useEffect(() => () => cancelTimers(), []);

  // Programmatic rolls (AI turn, etc.) roll in place — no toss. Only a user's real drag/flick
  // triggers the physics motion. This keeps the home slot occupied and the dice always visible.

  const onPointerDown = (e) => {
    if (!canInteract) return;
    e.preventDefault();
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
    // Capture the dice's initial screen position so we can clamp to viewport while dragging
    const rect = e.currentTarget.getBoundingClientRect();
    diceBoxRef.current = {
      cx: rect.left + rect.width / 2,
      cy: rect.top + rect.height / 2,
      w: rect.width,
      h: rect.height,
    };
    startRef.current = { x: e.clientX, y: e.clientY };
    lastMoveRef.current = { x: e.clientX, y: e.clientY, t: performance.now() };
    velRef.current = { vx: 0, vy: 0 };
    setDrag({ active: true, dx: 0, dy: 0 });
    setPhys({ mode: 'idle', x: 0, y: 0, rotZ: 0 });
  };

  const onPointerMove = (e) => {
    if (!drag.active) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;
    // Clamp so the dice stays inside the viewport while dragging
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const halfW = diceBoxRef.current.w / 2;
    const halfH = diceBoxRef.current.h / 2;
    const { cx, cy } = diceBoxRef.current;
    const pad = 4;
    const minDx = (halfW + pad) - cx;
    const maxDx = vw - (halfW + pad) - cx;
    const minDy = (halfH + pad) - cy;
    const maxDy = vh - (halfH + pad) - cy;
    const dx = Math.max(minDx, Math.min(maxDx, rawDx));
    const dy = Math.max(minDy, Math.min(maxDy, rawDy));
    const now = performance.now();
    const dt = Math.max(1, now - lastMoveRef.current.t);
    velRef.current = {
      vx: (e.clientX - lastMoveRef.current.x) * 1000 / dt,
      vy: (e.clientY - lastMoveRef.current.y) * 1000 / dt,
    };
    lastMoveRef.current = { x: e.clientX, y: e.clientY, t: now };
    setDrag({ active: true, dx, dy });
  };

  const startPhysics = (initX, initY, vx, vy) => {
    cancelTimers();
    physRef.current = {
      x: initX, y: initY,
      vx, vy,
      rotZ: 0,
      vrot: (Math.random() - 0.5) * 900 + (vx * 0.25), // initial spin partly coupled to horizontal fling
      running: true,
      lastT: 0,
      startT: performance.now(),
    };
    setPhys({ mode: 'flying', x: initX, y: initY, rotZ: 0 });

    const step = (now) => {
      const p = physRef.current;
      if (!p.running) return;
      const prev = p.lastT || now;
      const dt = Math.min(0.04, (now - prev) / 1000);
      p.lastT = now;

      // Friction (linear drag): per-second decay factor ~0.35 (so velocity drops to ~35% per second at higher speeds,
      // slowing down until below rest threshold). Using an exp decay keeps it smooth.
      const fric = Math.pow(0.4, dt);
      p.vx *= fric;
      p.vy *= fric;
      p.vrot *= Math.pow(0.55, dt);

      // Integrate
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotZ += p.vrot * dt;

      // Bounce off viewport walls
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const { cx, cy, w, h } = diceBoxRef.current;
      const halfW = w / 2, halfH = h / 2, pad = 4;
      const minX = (halfW + pad) - cx;
      const maxX = vw - (halfW + pad) - cx;
      const minY = (halfH + pad) - cy;
      const maxY = vh - (halfH + pad) - cy;
      const bounceDamp = 0.68;
      let hitWall = false;
      if (p.x < minX) { p.x = minX; p.vx = Math.abs(p.vx) * bounceDamp; p.vrot = -p.vrot * 0.8 + (Math.random() - 0.5) * 200; hitWall = true; }
      if (p.x > maxX) { p.x = maxX; p.vx = -Math.abs(p.vx) * bounceDamp; p.vrot = -p.vrot * 0.8 + (Math.random() - 0.5) * 200; hitWall = true; }
      if (p.y < minY) { p.y = minY; p.vy = Math.abs(p.vy) * bounceDamp; p.vrot = -p.vrot * 0.8 + (Math.random() - 0.5) * 200; hitWall = true; }
      if (p.y > maxY) { p.y = maxY; p.vy = -Math.abs(p.vy) * bounceDamp; p.vrot = -p.vrot * 0.8 + (Math.random() - 0.5) * 200; hitWall = true; }
      // On wall impact, briefly squash the cube to sell the collision
      if (hitWall) {
        const btn = document.querySelector('.dice3d');
        if (btn) {
          btn.classList.remove('impact');
          void btn.offsetWidth; // force reflow so animation restarts
          btn.classList.add('impact');
        }
      }

      // Height arc: while the die is moving fast it's "in the air"; as it slows it settles down.
      // This sells the Z-depth illusion — cube lifts on fling, shadow expands below it.
      const speed = Math.hypot(p.vx, p.vy);
      const height = Math.min(90, speed * 0.085);
      setPhys({ mode: 'flying', x: p.x, y: p.y, rotZ: p.rotZ, height });

      const elapsed = (now - p.startT) / 1000;
      // Settle when the dice is nearly stopped or we hit the physics time limit.
      // Sequence: flying → landing (snap squash) → resting (elastic recover) → returning home.
      if ((speed < 22 && elapsed > 0.35) || elapsed > 1.4) {

        // via the elastic easing curve on .d3-throw, producing a springy bounce-back.
        restTimerRef.current = setTimeout(() => {

          // After squash recover + brief rest, spring home so the rolled face is clearly
          // visible at the home slot for the 2s hold the game layer enforces.
          returnTimerRef.current = setTimeout(() => {
            setPhys({ mode: 'returning', x: 0, y: 0, rotZ: 0, height: 0 });
            setTimeout(() => {
              setPhys({ mode: 'idle', x: 0, y: 0, rotZ: 0, height: 0 });
            }, 520);
          }, 360);
        }, 16);
        return;
      }
      rafRef.current = requestAnimationFrame(step);
    };

  const endDrag = (didRelease) => {
    const { dx, dy } = drag;
    const dist = Math.hypot(dx, dy);
    const { vx, vy } = velRef.current;
    const speed = Math.hypot(vx, vy);
    setDrag({ active: false, dx: 0, dy: 0 });
    if (!didRelease || !canInteract) return;

    // The inner cube will tumble-and-settle on the face via the rolling→false transition.
    const isTap = dist < 8 && speed < 200;
    if (isTap) {
      onClick?.();

    let launchVx, launchVy;
    if (speed > 200) {
      // Real flick: use measured velocity directly
      launchVx = vx;
      launchVy = vy;
    } else {
      // Held-and-released: fling in drag direction with distance-derived magnitude
      const mag = Math.max(600, dist * 14);
      launchVx = (dx / dist) * mag;
      launchVy = (dy / dist) * mag;
    }
    startPhysics(dx, dy, launchVx, launchVy);
    onClick?.();

  const onPointerCancel = () => endDrag(false);

  // Responds to both tumble bounce and physics flight height for a unified "weight on ground" feel.
  const airborne = (phys.mode === 'flying' ? phys.height : 0);
  const shadowScale = 1 + currentRot.bounce / 40 + airborne / 55;
  const shadowOpacity = Math.max(0.08, 0.5 - currentRot.bounce / 50 - airborne / 160);
  const shadowBlur = 3 + airborne / 18;

  // Compose outer transform from drag / physics / resting / returning.
  // IMPORTANT: during physics we intentionally use translate ONLY. 2D rotation on the outer
  // wrapper flattens the perspective illusion — the dice must stay a clean 3D object at all
  // times. All visible rotation comes from the inner .d3-cube's rotateX/rotateY (true 3D).
  let outerTransform, outerTransition;
  if (drag.active) {
    // Lifting the die: subtle scale-up only, no 2D rotation (preserves 3D perspective).
    outerTransform = `translate(${drag.dx}px, ${drag.dy}px) scale(1.05)`;
    outerTransition = 'transform 60ms linear';
  } else if (phys.mode === 'flying') {
    // translateY minus height simulates Z-lift (die airborne); scale grows slightly with height
    // so it reads as "closer to camera" — a real thrown die looks bigger at apex.
    const liftScale = 1 + phys.height / 600;
    outerTransform = `translate(${phys.x}px, ${phys.y - phys.height}px) scale(${liftScale})`;
    outerTransition = 'none';
  } else if (phys.mode === 'landing') {
    // Impact frame: non-uniform squash (wider + shorter) simulates the die compressing against
    // the surface. Rendered with transition:none so the squash snaps in like a real hit.
    outerTransform = `translate(${phys.x}px, ${phys.y}px) scale(1.18, 0.82)`;
    outerTransition = 'none';
  } else if (phys.mode === 'resting') {
    // Spring back to natural scale with an elastic overshoot — the die bounces back upright.
    outerTransform = `translate(${phys.x}px, ${phys.y}px) scale(1, 1)`;
    outerTransition = 'transform 360ms cubic-bezier(.25, 1.7, .35, 1)';
  } else if (phys.mode === 'returning') {
    outerTransform = `translate(0, 0) scale(1)`;
    outerTransition = 'transform 520ms cubic-bezier(.34,1.26,.64,1)';
  } else {
    outerTransform = 'translate(0, 0) scale(1)';
    outerTransition = 'transform 380ms cubic-bezier(.34,1.56,.64,1)';
  }

  return (
    <button
      className={`dice3d ${rolling ? 'rolling' : ''} ${drag.active ? 'grabbing' : ''} ${phys.mode !== 'idle' ? 'physics' : ''} ${phys.mode === 'resting' ? 'resting' : ''}`}

      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}

            <Face faceVal={6} transform="rotateY(180deg) translateZ(var(--half))"/>

          className="d3-shadow"

        /* CRITICAL: filters must live on .dice3d (transform-style: flat), NOT on .d3-cube.

        @keyframes cube-impact-flash {

        }

             preserve-3d is required so the cube's faces render in true 3D (otherwise nested

          filter: blur(3px);
          pointer-events: none;
          transition: opacity 0.1s;
        }
      `}</style>

function App() {
  const [screen, setScreen] = useState('menu'); // menu | play | win
  const [config, setConfig] = useState(null);

  // ============== TWEAKABLE DEFAULTS ==============
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "gameSpeed": 0.9,
    "exactLanding": true,
    "showHintArrows": true,
    "confettiDensity": 60,
    "accentColor": "#e8583e",
    "boardBgMode": "cream",
    "showBlipPanel": true,
    "showActivityLog": true,
    "boardScale": 1,
    "diceShuffleMs": 350,
    "tokenStepMs": 160,
    "instantRolls": false,
    "showGlidePath": false,
    "rollButtonLabel": "Tap the dice to roll"
  }/*EDITMODE-END*/;

  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweakPanelOpen, setTweakPanelOpen] = useState(false);

  const updateTweak = (key, val) => {
    setTweaks(t => ({ ...t, [key]: val }));
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
    } catch(e) {}
  };

  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweakPanelOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweakPanelOpen(false);
    };
    window.addEventListener('message', onMsg);
    // announce AFTER listener is attached
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e) {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Apply accent color as CSS var
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
  }, [tweaks.accentColor]);

  const handleStart = (cfg) => {
    setConfig(cfg);
    setScreen('play');
  };

  const handleQuit = () => {
    setScreen('menu');
    setConfig(null);
  };

  return (
    <>
      {screen === 'menu' && <ModeSelect onStart={handleStart}/>}
      {screen === 'play' && <Game config={config} onQuit={handleQuit} tweaks={tweaks}/>}
      {tweakPanelOpen && <TweaksPanel tweaks={tweaks} onChange={updateTweak} onClose={() => setTweakPanelOpen(false)} onReset={() => setTweaks(TWEAK_DEFAULTS)}/>}
    </>
  );
}
